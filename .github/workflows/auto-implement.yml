name: Auto-implement task

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  implement:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install OpenCode CLI
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Configure git identity and signing
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          git config user.name "raschmitt"
          git config user.email "rogerio.schmitt@me.com"
          git config user.signingkey "$(gpg --list-secret-keys --keyid-format=long | awk '/^sec/ {print $2}' | cut -d'/' -f2)"
          git config commit.gpgsign true

      - name: Run agentic task implementation
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          export PATH="$HOME/.opencode/bin:$PATH"
          opencode run -m opencode/big-pickle --dangerously-skip-permissions \
            "You are an AI agent working on the zapinit project. Follow these steps in order:

            1. Use the find-next-task skill to identify what to work on by reading:
               @.agents/skills/find-next-task/SKILL.md

            2. If no task is available, stop and print 'No available tasks.' Do not proceed.

            3. Read the project context:
               @AGENTS.md
               @docs/tasks.md
               @docs/architecture.md

            4. Find the task section in docs/tasks.md and implement every subtask listed under it.
               Create a feature branch following the branch naming rules in AGENTS.md.
               Write code and tests. Run 'pytest' and 'ruff check .' -- both must pass before committing.

            5. Use the open-pr skill to commit all files and open the PR:
               @.agents/skills/open-pr/SKILL.md

            6. Once the PR is open, post a comment on it with the text:
               '🤖 This PR was automatically generated by the auto-implement workflow using OpenCode CLI with the big-pickle model.'
            "
