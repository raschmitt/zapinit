name: Auto-implement task

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      task_id:
        description: 'Task ID to implement (e.g. T-26). Leave blank for auto-detect.'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  implement:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure git identity and signing
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          git config user.name "raschmitt"
          git config user.email "rogerio.schmitt@me.com"
          git config user.signingkey "$(gpg --list-secret-keys --keyid-format=long | awk '/^sec/ {print $2}' | cut -d'/' -f2)"
          git config commit.gpgsign true

      - name: Run agentic task implementation
        uses: anomalyco/opencode/github@latest
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          TASK_ID: ${{ inputs.task_id || '' }}
        with:
          model: opencode/big-pickle
          prompt: |
            You are an AI agent working on the zapinit project. Follow these steps in order:

            1. If the TASK_ID environment variable is set and non-empty, skip
               find-next-task and use that ID directly. Otherwise, use the
               task-find-next skill to identify what to work on by reading:
               @.agents/skills/task-find-next/SKILL.md

            2. If no task is available, stop and print 'No available tasks.' Do not proceed.

            3. Read the project context:
               @AGENTS.md
               @docs/tasks.md
               @docs/architecture.md

            4. If the task is not yet fully implemented, find the task section in
               docs/tasks.md and implement every subtask listed under it.
               Create a feature branch following the branch naming rules in AGENTS.md.
               Write code and tests. Run 'pytest' and 'ruff check .' -- both must pass
               before committing.

            5. Use the open-pr skill to commit all files and open the PR:
               @.agents/skills/pr-open/SKILL.md

            6. Once the PR is open, post a comment on it with the text:
               '🤖 This PR was automatically generated by the auto-implement workflow using OpenCode CLI with the big-pickle model.'
