name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install OpenCode CLI
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Run AI code review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          export PATH="$HOME/.opencode/bin:$PATH"
          opencode run -m opencode/minimax-m2.5-free --dangerously-skip-permissions \
            "Review the PR diff by following the instructions in:
             @.agents/skills/ai-review/SKILL.md

             The PR number is in the PR_NUMBER environment variable.
             Do NOT modify any files — only review."
