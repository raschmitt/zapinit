name: AI Fix Loop
on:
  pull_request_review:
    types: [submitted]
permissions:
  contents: write
  pull-requests: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install OpenCode CLI
        run: curl -fsSL https://opencode.ai/install | bash
      - name: Configure git identity and signing
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          git config user.name "raschmitt"
          git config user.email "rogerio.schmitt@me.com"
          git config user.signingkey "$(gpg --list-secret-keys --keyid-format=long | awk '/^sec/ {print $2}' | cut -d'/' -f2)"
          git config commit.gpgsign true
      - name: Process review comments
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          export PATH="$HOME/.opencode/bin:$PATH"
          opencode run -m opencode/big-pickle --dangerously-skip-permissions \
            "You are an AI agent processing unresolved review threads on \
             PR #${{ github.event.pull_request.number }} of raschmitt/zapinit.

             1. Fetch the diff:
                git diff origin/main...HEAD

             2. Fetch all unresolved review threads via GraphQL:
                gh api graphql -f query='
                  { repository(owner: \"raschmitt\", name: \"zapinit\") {
                    pullRequest(number: ${{ github.event.pull_request.number }}) {
                      reviewThreads(first: 100) { nodes {
                        id isResolved
                        comments(first: 2) { nodes { body path line } totalCount }
              } } } } }'

             3. For each thread that is unresolved and has no replies
                (totalCount == 1): decide if it is a valid issue or not.
                - Valid: fix the code, commit it (include \\\"Co-authored-by: claude <claude@anthropic.com>\\\"),
                  then resolve the thread with:
                  gh api graphql -f query='mutation { resolveReviewThread(input: { threadId: \\\"<ID>\\\" }) { thread { isResolved } } }'
                - Invalid: reply explaining why it is not applicable, using:
                  gh api graphql -f query='mutation { addPullRequestReviewThreadReply(input: { pullRequestReviewThreadId: \\\"<ID>\\\", body: \\\"<reply>\\\" }) { comment { id } } }'

             4. After processing all threads, push any commits:
                git push origin HEAD:refs/heads/${{ github.event.pull_request.head.ref }}

             5. Check if a PR comment contains the text \"<!-- ai-fix -->\".
                If the iteration count in that comment is 5 or more, stop.
                Otherwise, post or update it with the new iteration number.

             Do NOT modify workflow files (.github/workflows/*) or scripts
             in .agents/skills/ai-review/scripts/."
