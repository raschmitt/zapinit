name: AI Fix Loop
on:
  pull_request_review:
    types: [submitted]
permissions:
  contents: write
  pull-requests: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install OpenCode CLI
        run: curl -fsSL https://opencode.ai/install | bash
      - name: Configure git identity and signing
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          git config user.name "raschmitt"
          git config user.email "rogerio.schmitt@me.com"
          git config user.signingkey "$(gpg --list-secret-keys --keyid-format=long | awk '/^sec/ {print $2}' | cut -d'/' -f2)"
          git config commit.gpgsign true
      - name: Process review comments
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          export PATH="$HOME/.opencode/bin:$PATH"
          opencode run -m opencode/big-pickle --dangerously-skip-permissions \
            "CRITICAL RULE: Never submit a new PR review. Never post a new \
             issue comment. Only reply to or resolve EXISTING review threads. \
             Any new review or comment will trigger this workflow again.

             You are an AI agent processing unresolved review threads on \
             PR #${{ github.event.pull_request.number }} of raschmitt/zapinit.

             1. Fetch the diff:
                git diff origin/main...HEAD

             2. Fetch all unresolved review threads via GraphQL:
                gh api graphql -f query='
                  { repository(owner: \"raschmitt\", name: \"zapinit\") {
                    pullRequest(number: ${{ github.event.pull_request.number }}) {
                      reviewThreads(first: 100) { nodes {
                        id isResolved
                        comments(first: 2) { nodes { body path line } totalCount }
              } } } } }'

             3. Find the iteration counter in PR comments:
                gh api repos/raschmitt/zapinit/issues/${{ github.event.pull_request.number }}/comments --jq '.'
                Look for a comment with \"<!-- ai-fix -->\". Extract the iteration
                number. If >= 5, stop and do nothing. If not found, this is
                iteration 1.

             4. For each thread where unresolved AND totalCount == 1:
                - Valid issue: fix the code, then resolve the thread with:
                  gh api graphql -f query='mutation { resolveReviewThread(input: { threadId: \"<ID>\" }) { thread { isResolved } } }'
                - Invalid: reply (do NOT resolve) with:
                  gh api graphql -f query='mutation { addPullRequestReviewThreadReply(input: { pullRequestReviewThreadId: \"<ID>\", body: \"<reply>\" }) { comment { id } } }'

             5. If no code was changed, stop here. Do NOT push.

             6. If code was changed:
                git add -A
                git commit -m \"fix: apply review fixes\" -m \"Co-authored-by: claude <claude@anthropic.com>\"
                git push origin HEAD:refs/heads/${{ github.event.pull_request.head.ref }}

             7. Update the iteration counter:
                - Find the existing \"<!-- ai-fix -->\" comment by ID
                - PATCH it with the new iteration number via:
                  gh api repos/raschmitt/zapinit/issues/comments/<ID> -X PATCH -f body=\"<!-- ai-fix --> iteration=N\"
                - If no existing comment, POST one:
                  gh api repos/raschmitt/zapinit/issues/${{ github.event.pull_request.number }}/comments -X POST -f body=\"<!-- ai-fix --> iteration=1\"

             NEVER post new issue comments. NEVER submit a new PR review."
