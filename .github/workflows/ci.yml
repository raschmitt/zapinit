name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'app/**'
              - 'tests/**'
              - 'requirements*.txt'
              - 'pyproject.toml'
              - '.github/workflows/ci.yml'

  lint:
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      - name: No code changes detected - skipping lint
        if: needs.changes.outputs.should_run != 'true'
        run: echo "No code changes detected - skipping lint"

      - uses: actions/checkout@v6
        if: needs.changes.outputs.should_run == 'true'

      - uses: actions/setup-python@v6
        if: needs.changes.outputs.should_run == 'true'
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: needs.changes.outputs.should_run == 'true'
        run: pip install -r requirements-dev.txt

      - name: Lint
        if: needs.changes.outputs.should_run == 'true'
        run: ruff check .

      - name: Format check
        if: needs.changes.outputs.should_run == 'true'
        run: ruff format --check .

  security:
    runs-on: ubuntu-latest
    needs: [changes, lint]
    steps:
      - name: No code changes detected - skipping security
        if: needs.changes.outputs.should_run != 'true'
        run: echo "No code changes detected - skipping security"

      - uses: actions/checkout@v6
        if: needs.changes.outputs.should_run == 'true'

      - uses: actions/setup-python@v6
        if: needs.changes.outputs.should_run == 'true'
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: needs.changes.outputs.should_run == 'true'
        run: pip install -r requirements-dev.txt

      - name: Dependency vulnerability scan
        if: needs.changes.outputs.should_run == 'true'
        run: pip-audit -r requirements.txt -r requirements-dev.txt

      - name: Static security analysis
        if: needs.changes.outputs.should_run == 'true'
        run: bandit -r app/ -lll

  test:
    runs-on: ubuntu-latest
    needs: [changes, lint]
    steps:
      - name: No code changes detected - skipping test
        if: needs.changes.outputs.should_run != 'true'
        run: echo "No code changes detected - skipping test"

      - uses: actions/checkout@v6
        if: needs.changes.outputs.should_run == 'true'

      - uses: actions/setup-python@v6
        if: needs.changes.outputs.should_run == 'true'
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: needs.changes.outputs.should_run == 'true'
        run: pip install -r requirements-dev.txt

      - name: Install Playwright browsers
        if: needs.changes.outputs.should_run == 'true'
        run: python3 -m playwright install chromium

      - name: Test with coverage
        if: needs.changes.outputs.should_run == 'true'
        run: pytest --cov=app --cov-fail-under=80 --cov-report=xml --cov-report=html --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v7.0.1
        if: needs.changes.outputs.should_run == 'true'
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/

  sonarcloud:
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: No code changes detected - skipping sonarcloud
        if: needs.changes.outputs.should_run != 'true'
        run: echo "No code changes detected - skipping sonarcloud"

      - uses: actions/checkout@v6
        if: needs.changes.outputs.should_run == 'true'
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v8.0.1
        if: needs.changes.outputs.should_run == 'true'
        with:
          name: coverage-report
          path: .

      - name: SonarQube Scan
        if: needs.changes.outputs.should_run == 'true'
        uses: SonarSource/sonarqube-scan-action@v8.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  mutation:
    runs-on: ubuntu-latest
    needs: [changes, test]
    steps:
      - name: No code changes detected - skipping mutation
        if: needs.changes.outputs.should_run != 'true'
        run: echo "No code changes detected - skipping mutation"

      - uses: actions/checkout@v6
        if: needs.changes.outputs.should_run == 'true'

      - uses: actions/setup-python@v6
        if: needs.changes.outputs.should_run == 'true'
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: needs.changes.outputs.should_run == 'true'
        run: pip install -r requirements-dev.txt

      - name: Run mutation tests
        if: needs.changes.outputs.should_run == 'true'
        run: python scripts/check_mutation_score.py

      - name: Generate mutation HTML report
        if: needs.changes.outputs.should_run == 'true'
        run: mutmut html

      - name: Upload mutation report
        uses: actions/upload-artifact@v7.0.1
        if: needs.changes.outputs.should_run == 'true'
        with:
          name: mutation-report
          path: html/
