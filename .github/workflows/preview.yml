name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  changes:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'app/**'
              - 'tests/**'
              - 'requirements*.txt'
              - 'pyproject.toml'
              - '.github/workflows/ci.yml'

  deploy:
    needs: [changes]
    if: github.event.action != 'closed' && needs.changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build static site
        run: |
          mkdir -p _site/js _site/static
          cp app/templates/index.html _site/index.html
          cp app/static/js/app.js _site/js/app.js
          cp app/static/favicon-*.svg _site/static/
          sed -i "s|/static/{% if theme == 'dark' %}favicon-dark.svg{% else %}favicon-light.svg{% endif %}|/static/favicon-light.svg|" _site/index.html
          sed -i 's|/static/js/app.js|./js/app.js|' _site/index.html
          sed -i 's|/static/|./static/|g' _site/index.html
          sed -i 's|/static/|./static/|g' _site/js/app.js

      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
          branch: gh-pages
          target-folder: previews/pr-${{ github.event.number }}
          clean: true

      - name: Post preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-preview -->';
            const url = `https://raschmitt.github.io/zapinit/previews/pr-${{ github.event.number }}/`;
            const body = `${marker}\n**Preview:** ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  teardown:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: gh-pages

      - name: Remove preview
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm -rf previews/pr-${{ github.event.number }} || true
          git diff --cached --quiet || git commit -m "chore: teardown preview for PR #${{ github.event.number }}"
          git push
