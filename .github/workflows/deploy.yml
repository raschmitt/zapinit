name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "app/templates/index.html"
      - "app/static/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build static site
        run: |
          mkdir -p _site/js
          cp app/templates/index.html _site/index.html
          cp app/static/js/app.js _site/js/app.js
          sed -i 's|/static/js/app.js|./js/app.js|' _site/index.html

      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
          branch: gh-pages
          clean: true
          clean-exclude: previews/
