name: AI Fix Loop

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install OpenCode CLI
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Configure git identity and signing
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          git config user.name "raschmitt"
          git config user.email "rogerio.schmitt@me.com"
          git config user.signingkey "$(gpg --list-secret-keys --keyid-format=long | awk '/^sec/ {print $2}' | cut -d'/' -f2)"
          git config commit.gpgsign true

      - name: Run AI fix
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          export PATH="$HOME/.opencode/bin:$PATH"
          opencode run -m opencode/big-pickle --dangerously-skip-permissions \
            "Fix PR review comments by following the instructions in:
             @.agents/skills/pr-fix/SKILL.md

             The PR number is in the PR_NUMBER environment variable."
