sonar.projectKey=raschmitt_zapinit
sonar.organization=raschmitt

sonar.sources=app
sonar.tests=tests

sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage.xml
sonar.coverage.exclusions=app/static/**

# Suppress Web:S5725 (missing SRI on CDN scripts) for the HTML template.
# Both libphonenumber-js and Tailwind are loaded from trusted CDNs (jsdelivr.net / cdn.tailwindcss.com)
# using floating version ranges (@1 / latest). Pinning an exact version + integrity hash would require
# a manual update on every patch release with no meaningful security gain for this project.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=Web:S5725
sonar.issue.ignore.multicriteria.e1.resourceKey=app/templates/index.html

sonar.pullrequest.provider=github
sonar.pullrequest.github.repository=raschmitt/zapinit

sonar.qualitygate.wait=true

sonar.newCodePeriod.type=reference_branch
sonar.newCodePeriod.value=main
