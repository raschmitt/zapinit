<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zapinit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                         Oxygen, Ubuntu, Cantarell, sans-serif;
        }
    </style>
</head>
<body class="bg-white min-h-screen flex flex-col items-center justify-center px-4">

    <div class="w-full max-w-xl flex flex-col items-center gap-8">

        <h1 class="text-5xl font-light tracking-tight select-none">

                type="tel"
                placeholder="Phone number"
                autocomplete="tel"
                class="flex-1 outline-none text-gray-700 placeholder-gray-400 text-base bg-transparent"
            />
        </div>

        <div class="flex flex-col sm:flex-row gap-3 w-full justify-center">
            <button
                id="open-wa"
                type="button"
                class="flex items-center justify-center gap-2 bg-[#25D366] hover:bg-[#1ebe5d] active:bg-[#18a852] text-white font-medium px-8 py-3 rounded-full transition-colors w-full sm:w-auto"

                </svg>
                Open on WhatsApp
            </button>
        </div>

        <p id="error-msg" class="text-red-500 text-sm hidden"></p>

    </div>

    <script src="/static/js/app.js"></script>

</html>
